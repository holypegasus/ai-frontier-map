<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Six-axis radar profiles for AI neolabs.">
  <title>Radar Profiles</title>
  <link rel="stylesheet" href="site.css?v=radar-axis-selection-state">
</head>
<body data-page="radar">
  <header class="site-header">
    <nav class="view-nav" aria-label="Views">
      <a href="index.html" data-view-link data-target="index.html">Space</a>
      <a class="is-current" href="radar-profiles.html" data-view-link data-target="radar-profiles.html">Radar</a>
      <a href="tech-web.html" data-view-link data-target="tech-web.html">Tech web</a>
    </nav>
  </header>
  <main class="view-main radar-main">
    <div class="radar-workspace">
      <section class="radar-chart-column" aria-label="Radar comparison">
        <div class="radar-plot"><svg id="radar-svg" class="radar-svg" role="img" tabindex="-1"></svg></div>
        <div class="legend radar-legend"><span id="radar-cohort-label" class="muted"></span><span><i id="radar-selected-swatch" class="legend-line solid-line"></i><span>Highlight: <span id="radar-selected-label"></span></span></span></div>
      </section>
      <section class="radar-table-wrap" aria-labelledby="radar-table-title">
        <div class="radar-table-heading">
          <h2 id="radar-table-title">Lab profiles</h2>
          <button id="radar-full-table-button" class="button radar-full-table-button" type="button" aria-controls="radar-lab-table-body" aria-pressed="false">Show full table</button>
          <button id="radar-return-button" class="button radar-return-button" type="button" aria-label="Return to Radar view" aria-controls="radar-svg"><kbd>Esc</kbd><span>Radar View</span></button>
        </div>
        <table class="radar-table">
          <thead><tr><th scope="col">Lab</th><th scope="col">Thesis</th></tr></thead>
          <tbody id="radar-lab-table-body"></tbody>
        </table>
      </section>
    </div>
    <p class="source-note last-updated" data-last-updated></p>
  </main>
  <script src="neolabs-data.js"></script>
  <script src="app.js?v=radar-axis-selection-state"></script>
</body>
</html>
