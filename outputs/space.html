<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Stellar space map of AI neolabs.">
  <title>Space</title>
  <link rel="stylesheet" href="site.css">
</head>
<body data-page="space">
  <header class="site-header">
    <a class="brand" href="index.html" data-view-link data-target="index.html">Neolab Maps</a>
    <nav class="view-nav" aria-label="Views">
      <a class="is-current" href="space.html" data-view-link data-target="space.html">Space</a>
      <a href="radar-profiles.html" data-view-link data-target="radar-profiles.html">Radar</a>
      <a href="tech-web.html" data-view-link data-target="tech-web.html">Tech web</a>
    </nav>
  </header>
  <main class="view-main architecture-main">
    <section id="architecture-stage" class="architecture-stage" data-view="axes" aria-label="Neolab architecture constellation">
      <svg class="architecture-svg" role="img"></svg>
      <aside id="architecture-detail" class="star-detail" aria-live="polite" hidden>
        <button id="architecture-detail-close" class="star-detail-close" type="button" aria-label="Close lab details">×</button>
        <div id="architecture-confidence" class="star-detail-kicker"></div>
        <h2 id="architecture-name"></h2>
        <p id="architecture-note"></p>
        <div id="architecture-profile" class="star-metrics"></div>
        <div id="architecture-funding" class="funding-timeline"></div>
        <a id="architecture-website" class="star-detail-link" target="_blank" rel="noopener noreferrer">Visit website ↗</a>
        <div id="architecture-citations" class="space-citations"></div>
      </aside>
      <div class="star-legend" aria-label="Space map legend">
        <span><i class="star-key star-key-core"></i>Core · known amount raised</span>
        <span><i class="star-key star-key-halo"></i>Halo · latest valuation</span>
        <span><i class="star-age-scale"></i>newer - older</span>
        <span><i class="star-key star-key-gas"></i>Diffusivity · disclosure confidence</span>
      </div>
    </section>
    <p class="source-note last-updated" data-last-updated></p>
  </main>
  <script src="neolabs-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
